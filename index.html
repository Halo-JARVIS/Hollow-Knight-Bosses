<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hollow Knight Bosses</title>
<style>
body {
margin: 0;
overflow: hidden;
font-family: "Cinzel", serif;
background: black;
color: #d7b46a;
}

.page {
position: absolute;
width: 100vw;
height: 100vh;
display: none;
}

.active {
display: block;
}

/* Cover Page */
#cover {
background-size: cover;
background-position: center;
}

#cover-title {
position: absolute;
top: 30%;
width: 100%;
text-align: center;
font-size: 4rem;
color: #d7b46a;
text-shadow: 0 0 20px black;
}

/* Arrow styling */
.nav-arrow {
position: absolute;
bottom: 40px;
width: 70px;
cursor: pointer;

/* Soft golden glow */
filter: drop-shadow(0 0 12px #d7b46a) drop-shadow(0 0 4px #d7b46a);
transition: filter 0.2s ease;
}

.nav-arrow:hover {
filter: drop-shadow(0 0 20px #ffd98a) drop-shadow(0 0 8px #ffd98a);
}

.next-arrow {
right: 40px;
}

.back-arrow {
left: 40px;
transform: scaleX(-1);
}

/* Boss Pages */
.boss-layout {
display: flex;
height: 100%;
width: 100%;
}

.sidebar {
width: 25%;
background: rgba(60, 45, 20, 0.8);
padding: 40px;
box-sizing: border-box;
border-right: 4px solid #d7b46a;
font-size: 1.4rem;
}

.boss-area {
width: 75%;
position: relative;
overflow: hidden;
}

.boss-bg {
position: absolute;
width: 100%;
height: 100%;
object-fit: cover;
filter: blur(4px) brightness(0.6);
}

.boss-name {
position: absolute;
top: 20px;
width: 100%;
text-align: center;
font-size: 3rem;
color: #d7b46a;
text-shadow: 0 0 10px black;
}

.boss-sprite {
position: absolute;
bottom: 40px;
left: 50%;
transform: translateX(-50%);
max-height: 70%;
}
</style>
</head>
<body>

<!-- COVER PAGE -->
<div id="cover" class="page active" style="background-image:url('cover.jpg');">
<div id="cover-title">HOLLOW KNIGHT BOSSES</div>
<img class="nav-arrow next-arrow" src="arrow.png" onclick="nextPage()">
</div>

<!-- Boss Data -->
<script>
const bosses = [
{
id: "gruz",
name: "GRUZ MOTHER",
bg: "gruz-bg.jpg",
sprite: "gruz.png",
hp: "Attuned: 80<br>Ascended: 100<br>Radiant: 100"
},
{
id: "vengefly",
name: "VENGEFLY KING",
bg: "vengefly-bg.jpg",
sprite: "vengefly.png",
hp: "Attuned: 90<br>Ascended: 120<br>Radiant: 120"
},
{
id: "mawlek",
name: "BROODING MAWLEK",
bg: "mawlek-bg.jpg",
sprite: "mawlek.png",
hp: "Attuned: 300<br>Ascended: 350<br>Radiant: 350"
},
{
id: "falseknight",
name: "FALSE KNIGHT",
bg: "falseknight-bg.jpg",
sprite: "falseknight.png",
hp: "Attuned: ???<br>Ascended: ???<br>Radiant: ???"
},
{
id: "hornet",
name: "HORNET",
bg: "hornet-bg.jpg",
sprite: "hornet.png",
hp: "Attuned: 225<br>Ascended: 250<br>Radiant: 250"
},
{
id: "mosscharger",
name: "MASSIVE MOSS CHARGER",
bg: "mosscharger-bg.jpg",
sprite: "mosscharger.png",
hp: "Attuned: 300<br>Ascended: 350<br>Radiant: 350"
}
];

let currentPage = 0;

function nextPage() {
document.querySelectorAll('.page')[currentPage].classList.remove('active');
currentPage++;
document.querySelectorAll('.page')[currentPage].classList.add('active');
}

function prevPage() {
document.querySelectorAll('.page')[currentPage].classList.remove('active');
currentPage--;
document.querySelectorAll('.page')[currentPage].classList.add('active');
}
</script>

<!-- Auto-generated Boss Pages -->
<script>
bosses.forEach((b, i) => {
document.body.innerHTML += &lt;div id="${b.id}" class="page">
<div class="boss-layout">
<div class="sidebar">
<h2>${b.name}&lt;/h2&gt; &lt;p&gt;${b.hp}</p>
</div>
<div class="boss-area">
<img class="boss-bg" src="${b.bg}"&gt; &lt;div class="boss-name"&gt;${b.name}</div>
<img class="boss-sprite" src="${b.sprite}"&gt; &lt;/div&gt; &lt;/div&gt; &lt;img class="nav-arrow back-arrow" src="arrow.png" onclick="prevPage()"&gt; &lt;img class="nav-arrow next-arrow" src="arrow.png" onclick="nextPage()"&gt; &lt;/div&gt;;
});
</script>

</body>
</html>
